<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <title>Biz9ja Logo</title>
  <desc>Biz9ja marketplace logo with price tag icon badge and wordmark</desc>

  <!-- Icon badge -->
  <g transform="translate(30, 30)">
    <rect x="0" y="0" width="130" height="130" rx="28" fill="#D85A30"/>
    <!-- Price tag body -->
    <rect x="26" y="20" width="54" height="74" rx="11" fill="none" stroke="white" stroke-width="4.5"/>
    <!-- Tag hole at top -->
    <circle cx="53" cy="20" r="7" fill="#D85A30"/>
    <circle cx="53" cy="20" r="3.5" fill="white"/>
    <!-- Item lines -->
    <line x1="36" y1="44" x2="70" y2="44" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="36" y1="59" x2="65" y2="59" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="36" y1="74" x2="68" y2="74" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Green check bubble -->
    <circle cx="96" cy="100" r="19" fill="#1D9E75"/>
    <polyline points="88,100 93,107 104,91" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark: Biz -->
  <text x="185" y="118" font-family="Arial, sans-serif" font-size="80" font-weight="700" fill="#D85A30" letter-spacing="-2">Biz</text>

  <!-- 9 encircled -->
  <circle cx="318" cy="80" r="38" fill="#D85A30"/>
  <text x="318" y="97" font-family="Arial, sans-serif" font-size="44" font-weight="700" fill="white" text-anchor="middle">9</text>

  <!-- ja -->
  <text x="360" y="118" font-family="Arial, sans-serif" font-size="80" font-weight="700" fill="#1D9E75" letter-spacing="-2">ja</text>

  <!-- Tagline -->
  <text x="360" y="158" font-family="Arial, sans-serif" font-size="14" font-weight="400" fill="#888780" text-anchor="middle" letter-spacing="4">BUY. SELL. ANYWHERE.</text>

</svg>
